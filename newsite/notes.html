<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes – Dronacharya College</title>
  <link rel="icon" type="image/png" href="finalicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Poppins:wght@300;400;600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .page-header {
      text-align: center;
      margin: 40px 0 20px;
    }
    .back-home {
      display: inline-block;
      margin-bottom: 20px;
      color: #0ff;
      text-decoration: none;
      font-size: 1.2rem;
    }
    .back-home:hover {
      text-decoration: underline;
    }
    .syllabus-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 15px;
    }
    .syllabus-item {
      background: rgba(30, 50, 50, 0.6);
      border-radius: 25px;
      padding: 15px;
      text-align: center;
      backdrop-filter: blur(5px);
      border: 1px solid #0ff3;
      transition: 0.2s;
      cursor: pointer;
    }
    .syllabus-item:hover {
      transform: translateY(-5px);
      border-color: #0ff;
    }
    .syllabus-item h4 {
      color: #b0fff0;
      margin-bottom: 10px;
      font-size: 1.2rem;
    }
    .notes-btn {
      background: transparent;
      border: 2px solid #0ff;
      color: #0ff;
      padding: 8px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }
    .notes-btn:hover {
      background: #0ff;
      color: #000;
    }
  </style>
</head>
<body>
  <nav style="position: static; margin-bottom: 20px;">
    <a href="index.html" class="logo">
      <img src="Screenshot 2026-03-01 110524.png" alt="Dronacharya College" style="height: 50px; width: auto;">
    </a>
    <div class="nav-links">
      <a href="index.html#hero">Home</a>
      <a href="index.html#about">About</a>
      <a href="index.html#resources">Resources</a>
      <a href="index.html#events">Events</a>
      <a href="index.html#holiday">Holidays</a>
      <a href="index.html#guide">Guide</a>
      <a href="index.html#games">Games</a>
      <a href="index.html#gallery">Gallery</a>
      <a href="index.html#contact">Contact</a>
    </div>
  </nav>

  <div class="wrapper">
    <div class="page-header">
      <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
      <h1 class="section-title">Notes – Select Branch & Year</h1>
    </div>

    <div class="syllabus-grid" id="notesGrid"></div>
  </div>

  <footer style="margin-top: 50px;">
    <p class="animate-text">🚀 Dronacharya Juniors – build your future 🚀</p>
  </footer>

  <script>
    // ========== NOTES – SAME BRANCH LIST AS SYLLABUS ==========
    const notesItems = [
      { title: "CSE AI & IoT (1st Year)" },
      { title: "VLSI (ECE/EEE 1st Year)" },
      { title: "ME/AE (1st Year)" },
      { title: "CSE (2nd Year)" },
      { title: "CSE (3rd Year)" },
      { title: "CSIT (2nd Year)" },
      { title: "CSIT (3rd Year)" },
      { title: "ECE (2nd Year)" },
      { title: "ECE (3rd Year)" },
      { title: "ECS (2nd Year)" },
      { title: "ECS (3rd Year)" },
      { title: "EEE (2nd Year)" },
      { title: "EEE (3rd Year)" },
      { title: "ME (2nd Year)" },
      { title: "ME (3rd Year)" },
      { title: "AI/ML (2nd Year)" },
      { title: "AI/ML (3rd Year)" },
      { title: "IoT (2nd Year)" },
      { title: "IoT (3rd Year)" },
      { title: "RAA (2nd Year)" },
      { title: "RAA (3rd Year)" }
    ];

    const grid = document.getElementById('notesGrid');
    notesItems.forEach(item => {
      const div = document.createElement('div');
      div.className = 'syllabus-item';
      div.innerHTML = `
        <h4>${item.title}</h4>
        <button class="notes-btn">VIEW NOTES</button>
      `;
      grid.appendChild(div);
    });

    // Add click event to all buttons
    document.querySelectorAll('.notes-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        // Simple alert – clean and professional
        alert("📚 Notes will be available soon. We're working on it!");
      });
    });
  </script>
</body>
</html>
